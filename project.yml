name: AIMenu
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  AIMenu:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AIMenu
    resources:
      - path: Sources/AIMenu/Resources
    info:
      path: Sources/AIMenu/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleName: AIMenu
        CFBundleDisplayName: AIMenu
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aimenu.app
        PRODUCT_NAME: AIMenu
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: 1.0.6
  AIMenuTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/AIMenuTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AIMenu
schemes:
  AIMenu:
    build:
      targets:
        AIMenu: all
        AIMenuTests: [test]
    test:
      targets:
        - AIMenuTests
