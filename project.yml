name: AIMenu
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  AIMenu:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AIMenu
    resources:
      - path: Sources/AIMenu/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aimenu.app
        PRODUCT_NAME: AIMenu
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: AIMenu
        INFOPLIST_KEY_CFBundleDisplayName: AIMenu
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_LSUIElement: YES
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
  AIMenuTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/AIMenuTests
    dependencies:
      - target: AIMenu
schemes:
  AIMenu:
    build:
      targets:
        AIMenu: all
        AIMenuTests: [test]
    test:
      targets:
        - AIMenuTests
