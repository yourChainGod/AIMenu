<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18">
  <!-- Status bar template image: black on transparent -->
  <!-- Three tracks with staggered dots = diagonal "AI toggle menu" -->

  <!-- Tracks -->
  <rect x="2" y="3.5"  width="14" height="1.8" rx="0.9" fill="#000" opacity="0.50"/>
  <rect x="2" y="8.1"  width="14" height="1.8" rx="0.9" fill="#000" opacity="0.50"/>
  <rect x="2" y="12.7" width="14" height="1.8" rx="0.9" fill="#000" opacity="0.50"/>

  <!-- Dots (staggered: left, center, right) -->
  <circle cx="5"  cy="4.4"  r="2.6" fill="#000"/>
  <circle cx="9"  cy="9.0"  r="2.6" fill="#000"/>
  <circle cx="13" cy="13.6" r="2.6" fill="#000"/>
</svg>
